# fly.toml app configuration file generated for oksskolten on 2026-03-20T14:00:42+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'oksskolten-atsushi'
primary_region = 'nrt'

[build]

[env]
  NODE_ENV = "production"
  NO_SEED = "1"
  # ここは実際の.env.exampleに合わせて必要なら追加
  # 例:
  # DATABASE_URL = "file:/data/oksskolten.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "oksskolten_data"
  destination = "/data"